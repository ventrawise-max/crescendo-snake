<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0c0304"/>
  <radialGradient id="glow" cx="50%" cy="44%" r="55%">
    <stop offset="0%" stop-color="#ff2d00" stop-opacity=".34"/>
    <stop offset="100%" stop-color="#ff2d00" stop-opacity="0"/>
  </radialGradient>
  <circle cx="256" cy="225" r="235" fill="url(#glow)"/>
  <!-- LAMPSHADE hood: flares wide from the skull, narrows to the neck -->
  <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#232420"/>
    <stop offset="55%" stop-color="#141511"/>
    <stop offset="100%" stop-color="#070806"/>
  </linearGradient>
  <path fill="url(#hood)" stroke="#3c3e34" stroke-width="10"
    d="M256 42q-34-6-64 8C130 70 68 130 60 216c-6 66 46 138 118 178q38 22 78 22t78-22c72-40 124-112 118-178-8-86-70-146-132-166q-30-14-64-8z"/>
  <path fill="none" stroke="#969678" stroke-opacity=".16" stroke-width="8"
    d="M204 64Q92 190 176 400M308 64Q420 190 336 400M232 56Q170 200 214 412M280 56Q342 200 298 412"/>
  <!-- charcoal head wedge -->
  <linearGradient id="hd" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#33352c"/>
    <stop offset="100%" stop-color="#191b14"/>
  </linearGradient>
  <path fill="url(#hd)" stroke="#050603" stroke-width="9"
    d="M256 58c56 0 88 40 88 88 0 40-24 62-46 74h-84c-22-12-46-34-46-74 0-48 32-88 88-88z"/>
  <!-- angled almond eyes, slit pupils -->
  <g transform="translate(214 158) rotate(24)">
    <path fill="#000" d="M-38 0Q0-28 38 0Q0 28 -38 0z"/>
    <path fill="#ff6a00" d="M-31 0Q0-22 31 0Q0 22 -31 0z"/>
    <ellipse rx="6.5" ry="19" fill="#000"/>
    <circle cx="-11" cy="-7" r="4.6" fill="#ffe9b0" opacity=".75"/>
  </g>
  <g transform="translate(298 158) rotate(-24)">
    <path fill="#000" d="M-38 0Q0-28 38 0Q0 28 -38 0z"/>
    <path fill="#ff6a00" d="M-31 0Q0-22 31 0Q0 22 -31 0z"/>
    <ellipse rx="6.5" ry="19" fill="#000"/>
    <circle cx="11" cy="-7" r="4.6" fill="#ffe9b0" opacity=".75"/>
  </g>
  <!-- nostrils -->
  <ellipse cx="234" cy="212" rx="7" ry="4.4" fill="#050603" transform="rotate(-14 234 212)"/>
  <ellipse cx="278" cy="212" rx="7" ry="4.4" fill="#050603" transform="rotate(14 278 212)"/>
  <!-- WIDE dark strike jaw -->
  <linearGradient id="maw" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4a1016"/>
    <stop offset="60%" stop-color="#26080c"/>
    <stop offset="100%" stop-color="#0e0306"/>
  </linearGradient>
  <path fill="url(#maw)" stroke="#101208" stroke-width="10"
    d="M176 224q80 20 160 0l-24 96q-56 24-112 0z"/>
  <path fill="#191b14" stroke="#050603" stroke-width="8"
    d="M200 320q56 24 112 0q-56 46-112 0z"/>
  <!-- corner fangs curving inward -->
  <path fill="#f8f4ea" stroke="#b9af98" stroke-width="3"
    d="M186 230q-2 44 22 66q-10-32-6-62zM326 230q2 44-22 66q10-32 6-62z"/>
  <!-- inner teeth row -->
  <path fill="#e8e0cc" d="M222 238l7 20 7-19zM250 241l7 20 7-19zM278 240l7 20 7-19z"/>
  <!-- forked tongue -->
  <path fill="none" stroke="#e01414" stroke-width="8" stroke-linecap="round" d="M256 292q3 34 3 48"/>
  <path fill="none" stroke="#e01414" stroke-width="5.5" stroke-linecap="round" d="M259 340q-9 16-19 24M259 340q11 16 21 23"/>
  <!-- small crown on the skull -->
  <g transform="translate(256 52)">
    <path fill="#ffd24a" stroke="#9a7000" stroke-width="4"
      d="M-38 20l7-33 17 20 14-27 14 27 17-20 7 33z"/>
    <circle cy="-14" r="7" fill="#ff3355"/>
  </g>
</svg>
